[package]
name = "convergence-kit"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
description = "Sync abstraction layer for the GeniusLocus substrate kits. SyncManifest, SyncRecord wire format, SyncEngine trait. None backend (passthrough) and Federation backend (Ed25519 via ed25519-dalek) ship at v1.0; CloudKit is Apple-only and omitted from the Rust port."
license = "MIT OR Apache-2.0"
publish = false

[lib]
name = "convergence_kit"
path = "src/lib.rs"

[dependencies]
substrate-types = { path = "../../../libs/SubstrateTypes/rust" }
persistence-kit = { path = "../../PersistenceKit/rust" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
ed25519-dalek = { version = "2", features = ["rand_core"] }
rand_core = { version = "0.6", features = ["std"] }
