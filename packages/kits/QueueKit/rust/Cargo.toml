[package]
name = "queuekit"
version = "0.1.0"
edition = "2021"
description = "QueueKit Rust parallel — FilesystemBackend per QUEUEKIT_SPEC"

[dependencies]
substrate-types  = { package = "substrate-types", git = "https://github.com/codedaptive/moot-core", branch = "main" }
intellectus-lib  = { package = "intellectus-lib", git = "https://github.com/codedaptive/moot-core", branch = "main" }
serde      = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
uuid       = { version = "1", features = ["v4"] }

[dependencies.notify]
version  = "6"
optional = true

# persistence-kit is required only when the "persistencekit" feature is
# enabled. The dependency is path-relative to the workspace so no
# external version pin is needed. Gated to keep the default
# (Filesystem-only) build free of the SQLite/PostgreSQL transitive deps.
[dependencies.persistence-kit]
path     = "../../PersistenceKit/rust"
optional = true

[features]
# `watch` is included by default: on Linux RecommendedWatcher uses inotify
# (evented, sub-ms latency); on macOS it uses kqueue/FSEvents; on Windows it
# uses ReadDirectoryChangesW. If evented watcher setup fails at runtime
# (inotify watch-limit exhausted, unsupported filesystem, etc.) the
# FilesystemBackend::watch() falls back to 200 ms polling automatically.
# Build with --no-default-features --features filesystem to get the poll-only
# build (useful when the notify transitive dep is unwanted, e.g. embedded targets).
default     = ["filesystem", "watch"]
filesystem  = []
# Enables the real PersistenceKitBackend and pulls in persistence-kit.
persistencekit  = ["dep:persistence-kit"]
watch       = ["notify"]

[lib]
name = "queuekit"
path = "src/lib.rs"

[[test]]
name = "conformance"
path = "tests/conformance.rs"

# await_drain await-empty latch + pending_count depth probe parity
# (Dual-Path Intake P5 / G7). Mirrors AwaitDrainTests.swift over the
# FilesystemBackend.
[[test]]
name = "await_drain"
path = "tests/await_drain.rs"

# Tests for ToolName + allowlist, QueueKitSchema, PersistenceKitBackend
# round-trip, and QueueError variants. Requires the "persistencekit" feature.
[[test]]
name = "parity"
path = "tests/parity.rs"
required-features = ["persistencekit"]

# Contract tests for the polling fallback path. These run when the `watch`
# feature is disabled (--no-default-features --features filesystem). They
# verify that poll-based delivery satisfies the same watch() contract as the
# evented path, and that the fallback is always reachable at runtime.
[[test]]
name = "watch_polling"
path = "tests/watch_polling.rs"

# Contract tests for the evented (notify-backed) watch path and the poll
# fallback callable from within the evented build. Enabled by default since
# `watch` is now a default feature. Tests that delivery occurs promptly via
# OS events and that the poll_watch_loop fallback is correct.
[[test]]
name = "watch_evented"
path = "tests/watch_evented.rs"
required-features = ["watch"]
