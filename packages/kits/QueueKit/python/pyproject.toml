[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "queuekit"
version = "0.1.0"
description = "QueueKit — general-purpose queuing library (Python FilesystemBackend, per docs/canon/QUEUEKIT_SPEC.md)"
readme = "README.md"
requires-python = ">=3.10"
authors = [{name = "Forge Engineering"}]
# Zero required dependencies per spec §13.
dependencies = []

[project.optional-dependencies]
watch = ["watchdog>=3.0"]
dev = ["pytest>=7.0"]

[tool.setuptools.packages.find]
where = ["."]
include = ["queuekit*"]
